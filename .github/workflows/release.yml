name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: |
          curl -sL "https://github.com/yonaskolb/XcodeGen/releases/latest/download/xcodegen.zip" -o xcodegen.zip
          unzip -o xcodegen.zip
          chmod +x xcodegen/bin/xcodegen
          xcodegen/bin/xcodegen --version
          echo "$PWD/xcodegen/bin" >> $GITHUB_PATH

      - name: Generate project
        run: xcodegen generate

      - name: Build Release
        run: |
          xcodebuild -project SimultaneousInterpreter.xcodeproj \
            -scheme SimultaneousInterpreter \
            -configuration Release \
            -destination "generic/platform=macOS" \
            build CODE_SIGN_IDENTITY="-" CODE_SIGNING_REQUIRED=NO | grep -E "(error:|warning:|BUILD)"

      - name: Create DMG
        run: |
          mkdir -p output
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "SimultaneousInterpreter.app" -type d 2>/dev/null | head -1)
          if [ -n "$APP_PATH" ]; then
            echo "Found app at: $APP_PATH"
            hdiutil create -volname "SimultaneousInterpreter" \
              -srcfolder "$APP_PATH" \
              -ov -format UDZO \
              output/SimultaneousInterpreter.dmg
          else
            echo "App not found - build may have failed"
          fi

      - name: Create Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: output/SimultaneousInterpreter.dmg
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
