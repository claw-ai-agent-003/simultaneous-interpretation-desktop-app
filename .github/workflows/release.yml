name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      - name: Build Release DMG
        run: |
          xcodebuild -project SimultaneousInterpreter.xcodeproj \
            -scheme SimultaneousInterpreter \
            -configuration Release \
            -destination "generic/platform=macOS" \
            build CODE_SIGN_IDENTITY="-" CODE_SIGNING_REQUIRED=NO

      - name: Create DMG
        run: |
          # Create output directory
          mkdir -p output
          
          # Find built app
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "SimultaneousInterpreter.app" -type d 2>/dev/null | head -1)
          
          if [ -n "$APP_PATH" ]; then
            echo "Found app at: $APP_PATH"
            hdiutil create -volname "SimultaneousInterpreter" \
              -srcfolder "$APP_PATH" \
              -ov -format UDZO \
              output/SimultaneousInterpreter.dmg
          else
            echo "App not found - build may have failed"
          fi

      - name: Upload DMG
        uses: actions/upload-release-asset@v1
        if: always()
        with:
          upload-url: ${{ github.event.inputs.upload_url }}
          asset-path: output/SimultaneousInterpreter.dmg
          asset-name: SimultaneousInterpreter.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: actions/create-release@v1
        with:
          tag_name: ${{ github.ref }}
          release_name: ${{ github.ref }}
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
