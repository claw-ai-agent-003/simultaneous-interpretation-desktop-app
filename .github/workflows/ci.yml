name: CI

on:
  push:
    branches: [master, feat/**]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: macos-14
    strategy:
      matrix:
        swift-version: ["5.9"]

    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: |
          # Install XcodeGen 0.53.1 for Xcode 15.4 compatibility (format 76)
          VERSION=0.53.1
          curl -sL "https://github.com/SnapKit/XcodeGen/releases/download/${VERSION}/xcodegen-${VERSION}.zip" -o xcodegen.zip
          unzip -o xcodegen.zip
          chmod +x xcodegen
          ./xcodegen --version

      - name: List available schemes
        run: xcodebuild -list -project SimultaneousInterpreter.xcodeproj 2>/dev/null || echo "Project not generated"

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build
        run: xcodebuild -project SimultaneousInterpreter.xcodeproj -scheme SimultaneousInterpreter -configuration Debug build CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO

      - name: Build Release
        run: xcodebuild -project SimultaneousInterpreter.xcodeproj -scheme SimultaneousInterpreter -configuration Release build CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO
