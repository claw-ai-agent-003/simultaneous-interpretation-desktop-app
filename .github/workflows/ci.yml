name: CI

on:
  push:
    branches: [master, feat/**]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: macos-15
    strategy:
      matrix:
        swift-version: ["5.9"]

    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: |
          curl -sL "https://github.com/yonaskolb/XcodeGen/releases/latest/download/xcodegen.zip" -o xcodegen.zip
          unzip -o xcodegen.zip
          chmod +x xcodegen/bin/xcodegen
          xcodegen/bin/xcodegen --version
          echo "$PWD/xcodegen/bin" >> $GITHUB_PATH

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build Debug
        run: xcodebuild -project SimultaneousInterpreter.xcodeproj -scheme SimultaneousInterpreter -configuration Debug build CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO | grep -E "(error:|warning:|BUILD)"

      - name: Build Release
        run: xcodebuild -project SimultaneousInterpreter.xcodeproj -scheme SimultaneousInterpreter -configuration Release build CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO | grep -E "(error:|warning:|BUILD)"
